    <style>
        /* ===== RESET & MODERN VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Light mode (default) */
        body {
            background: linear-gradient(145deg, #e9eff7 0%, #dbe5f0 100%);
            color: #0a2a3b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            transition: background 0.3s, color 0.3s;
        }

        /* Night mode */
        body.night-mode {
            background: linear-gradient(145deg, #1a2634 0%, #0f1a24 100%);
            color: #e0e0e0;
        }

        .main-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 30, 60, 0.25), inset 0 1px 2px rgba(255,255,255,0.6);
            padding: 2rem 2rem;
            border: 1px solid rgba(255,255,255,0.7);
            transition: background 0.3s, border-color 0.3s;
            position: relative; /* for absolute positioning of theme toggle */
        }

        body.night-mode .main-container {
            background: rgba(30, 40, 50, 0.85);
            border-color: rgba(80, 100, 120, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        /* mobile adjustments */
        @media (max-width: 640px) {
            body { padding: 0.75rem; }
            .main-container { padding: 1.5rem 1rem; border-radius: 32px; }
        }

        /* ----- NIGHT MODE TOGGLE (top right corner) ----- */
        .theme-toggle {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: 2px solid #b6cde0;
            box-shadow: 0 4px 10px rgba(0,30,50,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            transition: 0.2s;
            z-index: 200;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            background: #e3f0fd;
        }

        body.night-mode .theme-toggle {
            background: #2a3a48;
            border-color: #5f9bc0;
            color: #f0f0f0;
        }

        /* ----- TEAM SECRET BANNER ----- */
        .team-banner {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(115deg, #ffffffb0 0%, #f0f7ff 100%);
            border-radius: 40px;
            padding: 0.8rem 1.8rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 12px 25px -10px rgba(0,40,70,0.2);
            backdrop-filter: blur(4px);
            transition: background 0.3s, border-color 0.3s;
        }

        body.night-mode .team-banner {
            background: linear-gradient(115deg, #2a3a48b0 0%, #1e2e3c 100%);
            border-color: rgba(120, 140, 160, 0.4);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .brand img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        body.night-mode .brand img {
            border-color: #2a3a48;
        }

        .brand h2 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(145deg, #0f5b7a, #1d4e6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        body.night-mode .brand h2 {
            background: linear-gradient(145deg, #a0c0d0, #80b0c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .telegram-btn {
            background: linear-gradient(145deg, #2A7EB3, #1f5f8a);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(0,100,150,0.3);
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
            text-decoration: none;
        }

        .telegram-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(145deg, #358ac7, #256fa3);
            box-shadow: 0 12px 28px rgba(0,120,180,0.4);
        }

        body.night-mode .telegram-btn {
            background: linear-gradient(145deg, #3a6f9f, #2a5a80);
        }

        @media (max-width: 600px) {
            .team-banner { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .brand h2 { font-size: 1.6rem; }
            .theme-toggle { top: 0.8rem; right: 0.8rem; width: 40px; height: 40px; font-size: 1.4rem; }
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 0.6rem 1rem;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 700;
            color: #0a2a3b;
            letter-spacing: -0.02em;
            border-bottom: 3px solid rgba(23, 78, 115, 0.2);
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            transition: border-color 0.3s, color 0.3s;
        }

        body.night-mode h1 {
            color: #c0d0e0;
            border-bottom-color: rgba(100, 150, 200, 0.3);
        }

        h1 span {
            background: linear-gradient(135deg, #1d5b8e, #154b73);
            color: white;
            font-size: 1rem;
            padding: 0.4rem 1.4rem;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 4px 8px rgba(0,40,70,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        body.night-mode h1 span {
            background: linear-gradient(135deg, #2a5f8a, #1a4a70);
        }

        /* --- STICKY OVERALL PROGRESS BAR --- */
        .sticky-progress {
            position: sticky;
            top: 10px;
            z-index: 100;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            box-shadow: 0 10px 20px rgba(0,30,50,0.15);
            border: 1px solid rgba(255,255,255,0.7);
            margin-bottom: 1.5rem;
            transition: background 0.3s, border-color 0.3s;
        }

        body.night-mode .sticky-progress {
            background: rgba(30, 40, 50, 0.9);
            border-color: rgba(100, 130, 160, 0.5);
        }

        .sticky-progress span {
            font-weight: 600;
            color: #1d4b70;
            white-space: nowrap;
        }

        body.night-mode .sticky-progress span {
            color: #b0c8e0;
        }

        .sticky-progress .progress-bg {
            flex: 1;
            height: 12px;
            background: #ecf0f1;
            border-radius: 30px;
            overflow: hidden;
        }

        body.night-mode .sticky-progress .progress-bg {
            background: #3a4a58;
        }

        .sticky-progress .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            border-radius: 30px;
            transition: width 0.3s ease;
        }

        /* groups row */
        .groups-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin: 2rem 0 2rem 0;
        }

        .group-card {
            flex: 1 1 350px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 1.8rem 1.5rem 2rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 20px 35px -10px rgba(0, 40, 70, 0.2), inset 0 1px 4px white;
            transition: all 0.25s ease, background 0.3s, border-color 0.3s;
        }

        body.night-mode .group-card {
            background: rgba(40, 55, 70, 0.85);
            border-color: rgba(100, 130, 160, 0.5);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.1);
        }

        .group-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 45px -12px rgba(0, 50, 90, 0.3);
        }

        .group-card.group-1 { border-top: 8px solid #0f5b7a; }
        .group-card.group-2 { border-top: 8px solid #1f6d4c; }

        body.night-mode .group-card.group-1 { border-top-color: #4a9bc0; }
        body.night-mode .group-card.group-2 { border-top-color: #5fb092; }

        /* Group header */
        .group-header {
            display: flex;
            align-items: center;
            gap: 8px 12px;
            cursor: pointer;
            padding: 0.8rem 1rem;
            border-radius: 30px;
            background: rgba(220, 240, 255, 0.7);
            border-left: 6px solid #0f5b7a;
            margin-bottom: 0.5rem;
            transition: background 0.3s, border-color 0.3s;
        }

        body.night-mode .group-header {
            background: rgba(60, 80, 100, 0.7);
            border-left-color: #4a9bc0;
        }

        .group-2 .group-header { border-left-color: #1f6d4c; }
        body.night-mode .group-2 .group-header { border-left-color: #5fb092; }

        /* Group title – solid colors */
        .group-title {
            font-size: 2rem;
            font-weight: 700;
            color: #0f5b7a;
        }
        .group-2 .group-title {
            color: #1f6d4c;
        }
        body.night-mode .group-title {
            color: #a0c0d0;
        }
        body.night-mode .group-2 .group-title {
            color: #7fc0a0;
        }

        /* Paper header */
        .paper-header {
            display: flex;
            align-items: center;
            gap: 8px 12px;
            cursor: pointer;
            padding: 0.7rem 1rem 0.7rem 1.5rem;
            border-radius: 30px;
            background: rgba(230, 242, 255, 0.6);
            border-left: 5px solid #2a7fb3;
            margin: 0.8rem 0 0.2rem 0;
            font-size: 1.3rem;
            font-weight: 600;
            color: #173e57;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        body.night-mode .paper-header {
            background: rgba(60, 80, 105, 0.6);
            border-left-color: #5f9bc0;
            color: #c0d0e0;
        }

        /* Chapter header */
        .chapter-header {
            display: flex;
            align-items: center;
            gap: 8px 12px;
            cursor: pointer;
            padding: 0.6rem 1rem 0.6rem 2rem;
            border-radius: 30px;
            background: rgba(240, 248, 255, 0.8);
            border-left: 4px solid #4a9bc0;
            margin-left: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2e5570;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        body.night-mode .chapter-header {
            background: rgba(70, 90, 115, 0.8);
            border-left-color: #7fb0d0;
            color: #d0e0f0;
        }

        /* Subchapter header */
        .subchapter-header {
            display: flex;
            align-items: center;
            gap: 8px 12px;
            cursor: pointer;
            padding: 0.5rem 1rem 0.5rem 3rem;
            border-radius: 30px;
            background: rgba(250, 250, 240, 0.7);
            border-left: 3px solid #6db4d0;
            margin-left: 1rem;
            font-size: 1rem;
            font-weight: 500;
            color: #3f6990;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        body.night-mode .subchapter-header {
            background: rgba(80, 100, 120, 0.7);
            border-left-color: #9fc0d0;
            color: #d0e0f0;
        }

        /* topic list indentation */
        .topic-list {
            list-style: none;
            margin: 0.5rem 0 0.8rem 4rem;
        }
        @media (max-width: 600px) {
            .topic-list { margin-left: 2rem; }
        }

        .topic-list li label {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            padding: 0.5rem 0.8rem;
            border-radius: 20px;
            background: rgba(245, 250, 255, 0.5);
            transition: background 0.1s;
            border: 1px solid transparent;
            font-size: 0.95rem;
            color: inherit;
        }

        body.night-mode .topic-list li label {
            background: rgba(60, 80, 100, 0.5);
        }

        .topic-list li label:hover {
            background: #ffffff;
            border-color: #abc0d0;
        }

        body.night-mode .topic-list li label:hover {
            background: #4a6070;
            border-color: #7fa0c0;
        }

        .percentage {
            font-size: 0.85rem;
            background: rgba(210, 230, 250, 0.8);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #113855;
            font-weight: 600;
            white-space: nowrap;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.7);
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.3s, color 0.3s, border-color 0.3s;

        body.night-mode .percentage {
            background: rgba(60, 80, 105, 0.9);
            color: #e0e0e0;
            border-color: rgba(100,130,160,0.7);
        }

        /* Small circular progress for all levels */
        .progress-circle {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
            background: conic-gradient(#2ecc71 0deg 0deg, #e0e0e0 0deg 360deg);
        }

        /* hidden sections */
        .hidden { display: none !important; }

        button {
            background: white;
            border: 1.5px solid #b6cde0;
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            font-weight: 600;
            color: #1d4b70;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
            box-shadow: 0 8px 16px rgba(0,30,50,0.1);
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: #e3f0fd;
            border-color: #5f9bc0;
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(0,60,100,0.15);
        }

        body.night-mode button {
            background: #2a3a48;
            border-color: #5f9bc0;
            color: #c0d0e0;
        }

        .footer-note {
            margin-top: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            border-top: 2px dashed rgba(70, 130, 180, 0.3);
            padding-top: 1.5rem;
            color: #2b577a;
            font-weight: 500;
            transition: border-color 0.3s, color 0.3s;
        }

        body.night-mode .footer-note {
            border-top-color: rgba(100, 150, 200, 0.3);
            color: #a0b8d0;
        }

        .legend {
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.5);
            padding: 0.4rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        body.night-mode .legend {
            background: rgba(60, 80, 100, 0.5);
        }

        .legend span::before { content: "📊"; margin-right: 6px; }
    </style>
</head>

                        name: "📄 PAPER 3: TAXATION (100 MARKS)",
                        chapters: [
                            {
                                name: "SECTION A: INCOME TAX LAW (50 MARKS)",
                                subChapters: [

                                    { name: "2. Residential status and scope of total income: (i) Residential status (ii) Scope of total income" },
                                    { name: "3. Heads of income and the provisions governing computation of income under different heads: (i) Salaries (ii) Income from house property (iii) Profits and gains of business or profession Capital gains (iv) Income from other sources" },
                                    { name: "4. Provisions relating to clubbing of income, set-off or carry forward and set-off of losses, deductions from gross total income." },
                                    { name: "5. Advance Tax, Tax deduction at source and tax collection at source." },
                                    { name: "6. Provisions for filing return of income and self-assessment." },
                                    { name: "7. Computation of total income and income-tax payable by an individual under the alternative tax regimes under the Income-tax Act, 1961 to optimise tax liability." }
                                ]
                            },
                            {
                                name: "SECTION B: GOODS AND SERVICES TAX (GST) (50 MARKS)",
                                subChapters: [
                                    { name: "1. GST Laws: An introduction including Constitutional aspects." },
                                    { name: "2. Levy and collection of CGST and IGST: (i) Application of CGST/IGST law (ii) Concept of supply including composite and mixed supplies (iii) Charge of tax including reverse charge (iv) Exemption from tax (v) Composition levy" },
                                    { name: "3. Basic concepts of: (i) Classification (ii) Place of supply (iii) Time of supply (iv) Value of supply (v) Input tax credit" },
                                    { name: "4. Computation of GST liability." },
                                    { name: "5. Registration." },
                                    { name: "6. Tax invoice; Credit and Debit Notes; Electronic way bill." },
                                    { name: "7. Accounts and Records." },
                                    { name: "8. Returns." },
                                    { name: "9. Payment of tax." }
                                ]
                            }
                        ]
                    }
                ]
            },
            // GROUP II
            {
                name: "GROUP II",
                class: "group-2",
                papers: [
                    // PAPER 4: COST AND MANAGEMENT ACCOUNTING (unchanged)
                    {
                        name: "📄 PAPER 4: COST AND MANAGEMENT ACCOUNTING (100 MARKS)",
                        chapters: [
                            {
                                name: "1. Overview of Cost and Management Accounting",
                                subChapters: [
                                    { name: "(i) Introduction to Cost and Management Accounting" },
                                    { name: "(ii) Elements of Cost and preparation of Cost Sheets" }

                            },
                            {
                                name: "2. Ascertainment of Cost and Cost Accounting System",
                                subChapters: [

                            },

                                name: "3. Methods of Costing",
                                subChapters: [
                                    { name: "(i) Single Output/ Unit Costing" },
                                    { name: "(ii) Job Costing" },
                                    { name: "(iii) Batch Costing" },
                                    { name: "(iv) Process/ Operation Costing" },
                                    { name: "(v) Costing of Service Sectors" }
                                ]
                            },
                            {
                                name: "4. Cost Control and Analysis",
                                subChapters: [
                                    { name: "(i) Standard Costing" },
                                    { name: "(ii) Marginal Costing" },
                                    { name: "(iii) Budget and Budgetary Control" }
                                ]
                            }
                        ]
                    },
                    // PAPER 5: AUDITING AND ETHICS (unchanged)
                    {
                        name: "📄 PAPER 5: AUDITING AND ETHICS (100 MARKS)",
                        chapters: [
                            { name: "1. Nature, Objective and Scope of Audit" },
                            { name: "2. Audit Strategy, Audit Planning and Audit Program" },
                            { name: "3. Risk Assessment and Internal Control" },
                            { name: "4. Audit Evidence" },
                            { name: "5. Audit of Items of Financial Statements" },
                            { name: "6. Audit Documentation" },
                            { name: "7. Completion and Review" },
                            { name: "8. Audit Report" },
                            { name: "9. Special Features of Audit of Different Type of Entities" },
                            { name: "10. Audit of Banks" },
                            { name: "11. Ethics and Terms of Audit Engagements" }
                        ]
                    },
                    // PAPER 6: FINANCIAL MANAGEMENT AND STRATEGIC MANAGEMENT (UPDATED)
                    {
                        name: "📄 PAPER 6: FINANCIAL MANAGEMENT AND STRATEGIC MANAGEMENT (100 MARKS)",
                        chapters: [
                            {
                                name: "SECTION A – FINANCIAL MANAGEMENT (50 MARKS)",
                                subChapters: [
                                    {
                                        name: "1. Financial Management and Financial Analysis",
                                        subChapters: [
                                            { name: "Introduction to Financial Management Function" },
                                            { name: "Financial Analysis through Ratios" }
                                        ]
                                    },
                                    {
                                        name: "2. Financing Decisions and Cost of Capital",
                                        subChapters: [
                                            { name: "Sources of Finance" },
                                            { name: "Cost of Capital" },
                                            { name: "Capital Structure Decisions" },
                                            { name: "Leverages" }
                                        ]
                                    },
                                    {
                                        name: "3. Capital Investment and Dividend Decisions",
                                        subChapters: [
                                            { name: "Capital Investment Decisions" },
                                            { name: "Dividend Decisions" }
                                        ]
                                    },
                                    {
                                        name: "4. Management of Working Capital",
                                        subChapters: [
                                            { name: "Management of Working Capital" }
                                        ]
                                    }
                                ]
                            },
                            {
                                name: "SECTION B – STRATEGIC MANAGEMENT (50 MARKS)",
                                subChapters: [
                                    { name: "1. Introduction to Strategic Management" },
                                    { name: "2. Strategic Analysis: External Environment" },
                                    { name: "3. Strategic Analysis: Internal Environment" },
                                    { name: "4. Strategic Choices" },
                                    { name: "5. Strategy Implementation and Evaluation" }
                                ]
                            }
                        ]
                    }
                ]
            }
        ]
    };

    // helper to detect leaf chapter (no children)
    function isLeafChapter(chapter) {
        return (!chapter.subChapters || chapter.subChapters.length === 0) && (!chapter.topics || chapter.topics.length === 0);
    }

    function renderExpandableChapter(chapter, gIdx, pIdx, cIdx) {
        let html = `<div class="chapter-block" data-chapter="${gIdx}-${pIdx}-${cIdx}">`;
        html += `<div class="chapter-header" data-level="chapter" data-group="${gIdx}" data-paper="${pIdx}" data-chapter="${cIdx}">`;
        html += `<span>📚 ${chapter.name}</span>`;
        html += `<span class="percentage chapter-pct" id="chapterPct-${gIdx}-${pIdx}-${cIdx}">0%<span class="progress-circle" id="chapterCircle-${gIdx}-${pIdx}-${cIdx}"></span></span>`;
        html += `</div>`;
        html += `<div class="chapter-content hidden" id="chapterContent-${gIdx}-${pIdx}-${cIdx}">`;

        if (chapter.subChapters && chapter.subChapters.length) {
            chapter.subChapters.forEach((sub, sIdx) => {
                html += renderSubchapter(sub, gIdx, pIdx, cIdx, sIdx);
            });
        }
        if (chapter.topics && chapter.topics.length) {
            html += `<ul class="topic-list">`;
            chapter.topics.forEach(topic => {
                html += `<li><label><input type="checkbox" class="topic-check"> 🔹 ${topic}</label></li>`;
            });
            html += `</ul>`;
        }

        html += `</div></div>`;
        return html;
    }

    function renderSubchapter(sub, gIdx, pIdx, cIdx, sIdx) {
        // If sub has its own subChapters, it's a nested structure (like in updated Paper 6)
        if (sub.subChapters && sub.subChapters.length > 0) {
            let html = `<div class="subchapter-block" data-subchapter="${gIdx}-${pIdx}-${cIdx}-${sIdx}">`;
            html += `<div class="subchapter-header" data-level="subchapter" data-group="${gIdx}" data-paper="${pIdx}" data-chapter="${cIdx}" data-sub="${sIdx}">`;
            html += `<span>🔹 ${sub.name}</span>`;
            html += `<span class="percentage subchapter-pct" id="subPct-${gIdx}-${pIdx}-${cIdx}-${sIdx}">0%<span class="progress-circle" id="subCircle-${gIdx}-${pIdx}-${cIdx}-${sIdx}"></span></span>`;
            html += `</div>`;
            html += `<div class="subchapter-topics hidden" id="subTopics-${gIdx}-${pIdx}-${cIdx}-${sIdx}">`;
            // Render its sub-subchapters as a flat list (topics)
            html += `<ul class="topic-list">`;
            sub.subChapters.forEach(ss => {
                html += `<li><label><input type="checkbox" class="topic-check"> 🔹 ${ss.name}</label></li>`;
            });
            html += `</ul>`;
            html += `</div></div>`;
            return html;
        } else {
            // Normal leaf subchapter
            let html = `<div class="subchapter-block" data-subchapter="${gIdx}-${pIdx}-${cIdx}-${sIdx}">`;
            html += `<div class="subchapter-header" data-level="subchapter" data-group="${gIdx}" data-paper="${pIdx}" data-chapter="${cIdx}" data-sub="${sIdx}">`;
            html += `<span>🔹 ${sub.name}</span>`;
            html += `<span class="percentage subchapter-pct" id="subPct-${gIdx}-${pIdx}-${cIdx}-${sIdx}">0%<span class="progress-circle" id="subCircle-${gIdx}-${pIdx}-${cIdx}-${sIdx}"></span></span>`;
            html += `</div>`;
            html += `<div class="subchapter-topics hidden" id="subTopics-${gIdx}-${pIdx}-${cIdx}-${sIdx}">`;
            html += `<ul class="topic-list"><li><label><input type="checkbox" class="topic-check"> 🔹 ${sub.name}</label></li></ul>`;
            html += `</div></div>`;
            return html;
        }
    }

    // render everything
    const container = document.getElementById('groupsContainer');
    let html = '';

    syllabusData.groups.forEach((group, gIdx) => {
        html += `<div class="group-card ${group.class}" data-group="${gIdx}">`;
        html += `<div class="group-header" data-level="group" data-group="${gIdx}">`;
        html += `<span class="group-title">📁 ${group.name}</span>`;
        html += `<span class="percentage group-pct" id="groupPct-${gIdx}">0%<span class="progress-circle" id="groupCircle-${gIdx}"></span></span>`;
        html += `</div>`;
        // Removed the large group progress bar
        html += `<div class="group-papers hidden" id="groupPapers-${gIdx}">`;

        group.papers.forEach((paper, pIdx) => {
            html += `<div class="paper-block" data-paper="${gIdx}-${pIdx}">`;
            html += `<div class="paper-header" data-level="paper" data-group="${gIdx}" data-paper="${pIdx}">`;
            html += `<span>${paper.name}</span>`;
            html += `<span class="percentage paper-pct" id="paperPct-${gIdx}-${pIdx}">0%<span class="progress-circle" id="paperCircle-${gIdx}-${pIdx}"></span></span>`;
            html += `</div>`;
            html += `<div class="paper-chapters hidden" id="paperChapters-${gIdx}-${pIdx}">`;

            paper.chapters.forEach((chapter, cIdx) => {
                // Special handling for Paper 4 (Cost) – flatten subchapters into direct checkboxes
                if (gIdx === 1 && pIdx === 0 && chapter.subChapters && chapter.subChapters.length > 0) {
                    html += `<div class="chapter-block" data-chapter="${gIdx}-${pIdx}-${cIdx}">`;
                    html += `<div class="chapter-header" data-level="chapter" data-group="${gIdx}" data-paper="${pIdx}" data-chapter="${cIdx}">`;
                    html += `<span>📚 ${chapter.name}</span>`;
                    html += `<span class="percentage chapter-pct" id="chapterPct-${gIdx}-${pIdx}-${cIdx}">0%<span class="progress-circle" id="chapterCircle-${gIdx}-${pIdx}-${cIdx}"></span></span>`;
                    html += `</div>`;
                    html += `<div class="chapter-content hidden" id="chapterContent-${gIdx}-${pIdx}-${cIdx}">`;
                    html += `<ul class="topic-list">`;
                    chapter.subChapters.forEach(sub => {
                        html += `<li><label><input type="checkbox" class="topic-check"> 🔹 ${sub.name}</label></li>`;
                    });
                    html += `</ul>`;
                    html += `</div></div>`;
                }
                else if (isLeafChapter(chapter)) {
                    html += `<ul class="topic-list"><li><label><input type="checkbox" class="topic-check"> 🔹 ${chapter.name}</label></li></ul>`;
                } else {
                    html += renderExpandableChapter(chapter, gIdx, pIdx, cIdx);
                }
            });

            html += `</div></div>`;
        });

        html += `</div></div>`;
    });

    container.innerHTML = html;

    // ----- click handlers for drill-down -----
    document.querySelectorAll('.group-header').forEach(header => {
        header.addEventListener('click', function(e) {
            if (e.target.closest('input, label, .percentage')) return;
            const groupIdx = this.dataset.group;
            document.getElementById(`groupPapers-${groupIdx}`).classList.toggle('hidden');
        });
    });

    document.querySelectorAll('.paper-header').forEach(header => {
        header.addEventListener('click', function(e) {
            if (e.target.closest('input, label, .percentage')) return;
            const g = this.dataset.group, p = this.dataset.paper;
            document.getElementById(`paperChapters-${g}-${p}`).classList.toggle('hidden');
        });
    });

    document.querySelectorAll('.chapter-header').forEach(header => {
        header.addEventListener('click', function(e) {
            if (e.target.closest('input, label, .percentage')) return;
            const g = this.dataset.group, p = this.dataset.paper, c = this.dataset.chapter;
            document.getElementById(`chapterContent-${g}-${p}-${c}`).classList.toggle('hidden');
        });
    });

    document.querySelectorAll('.subchapter-header').forEach(header => {
        header.addEventListener('click', function(e) {
            if (e.target.closest('input, label, .percentage')) return;
            const g = this.dataset.group, p = this.dataset.paper, c = this.dataset.chapter, s = this.dataset.sub;
            document.getElementById(`subTopics-${g}-${p}-${c}-${s}`).classList.toggle('hidden');
        });
    });

    // ----- localStorage & progress (with bars) -----
    const STORAGE_PREFIX = 'ca_syllabus_';
    const checkboxes = document.querySelectorAll('input[type=checkbox]');

    checkboxes.forEach((cb, idx) => cb.dataset.index = idx);

    function loadTicks() {
        for (let i = 0; i < checkboxes.length; i++) {
            const key = STORAGE_PREFIX + i;
            const val = localStorage.getItem(key);
            if (val !== null) checkboxes[i].checked = (val === 'true');
        }
    }

    function saveHandler(e) {
        const cb = e.target;
        const idx = cb.dataset.index;
        if (idx !== undefined) {
            localStorage.setItem(STORAGE_PREFIX + idx, cb.checked);
        }
        updateAllPercentages();
    }
    checkboxes.forEach(cb => cb.addEventListener('change', saveHandler));

    function updateAllPercentages() {
        const totalOverall = checkboxes.length;
        const checkedOverall = Array.from(checkboxes).filter(cb => cb.checked).length;
        const overallPct = totalOverall ? Math.round((checkedOverall / totalOverall) * 100) : 0;

        // Update sticky overall bar
        document.getElementById('stickyOverallBar').style.width = overallPct + '%';
        document.getElementById('stickyOverallText').innerText = overallPct + '%';
        // Update the badge
        const badge = document.getElementById('overallPercentage');
        if (badge) badge.innerHTML = `⚫ ${overallPct}%`;

        // groups
        syllabusData.groups.forEach((g, gIdx) => {
            const groupCheckboxes = Array.from(document.querySelectorAll(`.group-card[data-group="${gIdx}"] .topic-check`));
            const total = groupCheckboxes.length;
            const checked = groupCheckboxes.filter(cb => cb.checked).length;
            const pct = total ? Math.round((checked / total) * 100) : 0;
            const pctSpan = document.getElementById(`groupPct-${gIdx}`);
            if (pctSpan) {
                pctSpan.innerHTML = pct + '%<span class="progress-circle" id="groupCircle-'+gIdx+'"></span>';
            }
            // Update group circle
            const groupCircle = document.getElementById(`groupCircle-${gIdx}`);
            if (groupCircle) {
                const angle = (pct / 100) * 360;
                groupCircle.style.background = `conic-gradient(#2ecc71 0deg ${angle}deg, #e0e0e0 ${angle}deg 360deg)`;
            }
        });

        // papers
        syllabusData.groups.forEach((g, gIdx) => {
            g.papers.forEach((p, pIdx) => {
                const paperCheckboxes = Array.from(document.querySelectorAll(`.paper-block[data-paper="${gIdx}-${pIdx}"] .topic-check`));
                const total = paperCheckboxes.length;
                const checked = paperCheckboxes.filter(cb => cb.checked).length;
                const pct = total ? Math.round((checked / total) * 100) : 0;
                const pctSpan = document.getElementById(`paperPct-${gIdx}-${pIdx}`);
                if (pctSpan) {
                    pctSpan.innerHTML = pct + '%<span class="progress-circle" id="paperCircle-'+gIdx+'-'+pIdx+'"></span>';
                }
                // Update paper circle
                const paperCircle = document.getElementById(`paperCircle-${gIdx}-${pIdx}`);
                if (paperCircle) {
                    const angle = (pct / 100) * 360;
                    paperCircle.style.background = `conic-gradient(#2ecc71 0deg ${angle}deg, #e0e0e0 ${angle}deg 360deg)`;
                }
            });
        });

        // chapters (only expandable ones)
        syllabusData.groups.forEach((g, gIdx) => {
            g.papers.forEach((p, pIdx) => {
                p.chapters.forEach((c, cIdx) => {
                    if (!isLeafChapter(c) || (gIdx === 1 && pIdx === 0)) { // include cost paper chapters
                        const chapterCheckboxes = Array.from(document.querySelectorAll(`.chapter-block[data-chapter="${gIdx}-${pIdx}-${cIdx}"] .topic-check`));
                        const total = chapterCheckboxes.length;
                        const checked = chapterCheckboxes.filter(cb => cb.checked).length;
                        const pct = total ? Math.round((checked / total) * 100) : 0;
                        const pctSpan = document.getElementById(`chapterPct-${gIdx}-${pIdx}-${cIdx}`);
                        if (pctSpan) {
                            pctSpan.innerHTML = pct + '%<span class="progress-circle" id="chapterCircle-'+gIdx+'-'+pIdx+'-'+cIdx+'"></span>';
                        }
                        // Update chapter circle
                        const chapterCircle = document.getElementById(`chapterCircle-${gIdx}-${pIdx}-${cIdx}`);
                        if (chapterCircle) {
                            const angle = (pct / 100) * 360;
                            chapterCircle.style.background = `conic-gradient(#2ecc71 0deg ${angle}deg, #e0e0e0 ${angle}deg 360deg)`;
                        }
                    }
                });
            });
        });

        // subchapters (for papers other than Cost)
        syllabusData.groups.forEach((g, gIdx) => {
            g.papers.forEach((p, pIdx) => {
                if (gIdx === 1 && pIdx === 0) return; // skip Cost paper – no subchapter blocks
                p.chapters.forEach((c, cIdx) => {
                    if (c.subChapters) {
                        c.subChapters.forEach((s, sIdx) => {
                            const subCheckboxes = Array.from(document.querySelectorAll(`.subchapter-block[data-subchapter="${gIdx}-${pIdx}-${cIdx}-${sIdx}"] .topic-check`));
                            const total = subCheckboxes.length;
                            const checked = subCheckboxes.filter(cb => cb.checked).length;
                            const pct = total ? Math.round((checked / total) * 100) : 0;
                            const pctSpan = document.getElementById(`subPct-${gIdx}-${pIdx}-${cIdx}-${sIdx}`);
                            if (pctSpan) {
                                pctSpan.innerHTML = pct + '%<span class="progress-circle" id="subCircle-'+gIdx+'-'+pIdx+'-'+cIdx+'-'+sIdx+'"></span>';
                            }
                            // Update subchapter circle
                            const subCircle = document.getElementById(`subCircle-${gIdx}-${pIdx}-${cIdx}-${sIdx}`);
                            if (subCircle) {
                                const angle = (pct / 100) * 360;
                                subCircle.style.background = `conic-gradient(#2ecc71 0deg ${angle}deg, #e0e0e0 ${angle}deg 360deg)`;
                            }
                        });
                    }
                });
            });
        });
    }

    document.getElementById('resetBtn').addEventListener('click', function() {
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith(STORAGE_PREFIX)) localStorage.removeItem(key);
        }
        checkboxes.forEach(cb => cb.checked = false);
        updateAllPercentages();
    });

    loadTicks();
    updateAllPercentages();

    // ----- Night mode toggle -----
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    const themeKey = 'ca_night_mode';

    // Load saved theme
    if (localStorage.getItem(themeKey) === 'true') {
        body.classList.add('night-mode');
        themeToggle.innerHTML = '☀️';
    } else {
        themeToggle.innerHTML = '🌙';
    }

    themeToggle.addEventListener('click', () => {
        body.classList.toggle('night-mode');
        const isNight = body.classList.contains('night-mode');
        localStorage.setItem(themeKey, isNight);
        themeToggle.innerHTML = isNight ? '☀️' : '🌙';
    });
})();
</script>
